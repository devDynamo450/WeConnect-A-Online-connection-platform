<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WeConnect — Sign in to your social platform. Connect with friends, share moments, and chat in real time." />
  <title>WeConnect — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <!-- Animated Background Blobs -->
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="auth-container">
    <!-- Brand Panel -->
    <section class="brand-panel">
      <div class="brand-content">
        <div class="brand-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" aria-hidden="true">
            <circle cx="24" cy="24" r="24" fill="url(#logo-grad)" />
            <path d="M14 18h20M14 24h14M14 30h20" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
            <defs>
              <linearGradient id="logo-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="brand-name">WeConnect</span>
        </div>
        <h1 class="brand-tagline">Connect. Share.<br />Belong.</h1>
        <p class="brand-description">A real-time social platform where every conversation feels alive. Share moments, build friendships, and stay connected — all in one place.</p>
        <ul class="feature-list" aria-label="Features">
          <li><span class="feature-icon">💬</span> Real-time messaging</li>
          <li><span class="feature-icon">📸</span> Photo sharing</li>
          <li><span class="feature-icon">🔔</span> Instant notifications</li>
          <li><span class="feature-icon">🌐</span> Social feed</li>
        </ul>
      </div>
    </section>

    <!-- Auth Form Panel -->
    <section class="form-panel">
      <div class="form-card">

        <!-- Tabs -->
        <nav class="auth-tabs" role="tablist">
          <button id="tab-login" class="auth-tab active" role="tab" aria-selected="true" aria-controls="panel-login">Sign In</button>
          <button id="tab-register" class="auth-tab" role="tab" aria-selected="false" aria-controls="panel-register">Create Account</button>
          <div class="tab-indicator" aria-hidden="true"></div>
        </nav>

        <!-- Facebook button + status -->
        <div id="fb-status-banner" class="fb-status-banner" hidden></div>

        <!-- Continue with Facebook -->
        <button id="fb-login-btn" class="btn-facebook" type="button" aria-label="Continue with Facebook">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white" aria-hidden="true">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          <span id="fb-btn-text">Continue with Facebook</span>
        </button>

        <!-- Continue with Instagram -->
        <div id="ig-status-banner" class="fb-status-banner" hidden></div>

        <div class="auth-divider"><span>or use email</span></div>

        <!-- Login Form -->
        <div id="panel-login" role="tabpanel" aria-labelledby="tab-login">
          <form id="login-form" novalidate>
            <div class="form-group">
              <label for="login-email">Email address</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <input type="email" id="login-email" name="email" placeholder="you@example.com" autocomplete="email" required />
              </div>
              <span class="field-error" id="login-email-error" role="alert"></span>
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                <input type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required />
                <button type="button" class="password-toggle" aria-label="Toggle password visibility" data-target="login-password">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <span class="field-error" id="login-password-error" role="alert"></span>
            </div>
            <div id="login-global-error" class="global-error" role="alert" hidden></div>
            <button type="submit" id="login-submit" class="btn-primary">
              <span class="btn-text">Sign In</span>
              <span class="btn-spinner" aria-hidden="true"></span>
            </button>
          </form>
        </div>

        <!-- Register Form -->
        <div id="panel-register" role="tabpanel" aria-labelledby="tab-register" hidden>
          <form id="register-form" novalidate>
            <div class="form-group">
              <label for="reg-username">Username</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" id="reg-username" name="username" placeholder="johndoe" autocomplete="username" required minlength="3" maxlength="30" />
              </div>
              <span class="field-error" id="reg-username-error" role="alert"></span>
            </div>
            <div class="form-group">
              <label for="reg-email">Email address</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <input type="email" id="reg-email" name="email" placeholder="you@example.com" autocomplete="email" required />
              </div>
              <span class="field-error" id="reg-email-error" role="alert"></span>
            </div>
            <div class="form-group">
              <label for="reg-password">Password</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                <input type="password" id="reg-password" name="password" placeholder="Min. 6 characters" autocomplete="new-password" required minlength="6" />
                <button type="button" class="password-toggle" aria-label="Toggle password visibility" data-target="reg-password">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <span class="field-error" id="reg-password-error" role="alert"></span>
              <div class="password-strength" id="password-strength" aria-live="polite">
                <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                <span id="strength-label"></span>
              </div>
            </div>
            <div id="reg-global-error" class="global-error" role="alert" hidden></div>
            <button type="submit" id="register-submit" class="btn-primary">
              <span class="btn-text">Create Account</span>
              <span class="btn-spinner" aria-hidden="true"></span>
            </button>
          </form>
        </div>

      </div>
    </section>
  </main>

  <!-- Facebook JS SDK (loaded async — won't block page render) -->
  <div id="fb-root"></div>

  <!-- Auth logic (plain script — works on both file:// and http://) -->
  <script src="js/auth.js"></script>

  <!-- Facebook SDK init (loaded after auth.js sets window.fbAsyncInit) -->
  <script async defer crossorigin="anonymous"
    src="https://connect.facebook.net/en_US/sdk.js">
  </script>
</body>
</html>
